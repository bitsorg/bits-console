# Update the bits CLI on a self-hosted runner
#
# Triggered via workflow_dispatch — either manually from GitHub's Actions UI or
# automatically from the bits Console (Settings → Runner administration →
# "Update bits").
#
# One job runs on the runner whose label matches the `runner_label` input.
# Dispatch once per label to update multiple runner types.
#
# Runner labels used in this repository
# ──────────────────────────────────────
#   bits-build-<platform>   Build runner for the given platform
#   bits-ingest             Ingestion host runner
#   bits-cvmfs-publisher    Stratum-0 / CVMFS publisher runner
#   bits-admin              Administrative runner (non-build tasks)
#
# The workflow installs or upgrades bits using pip (the standard installation
# method).  If bits is installed into a virtual-env or via pipx the runner
# should have the appropriate tool on PATH; the step tries pip, pip3, and
# pipx in order.

name: Update bits

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: >
          Runner label to update (e.g. bits-build-x86_64-el9, bits-ingest,
          bits-cvmfs-publisher, bits-admin).
          Must match an active self-hosted runner label exactly.
        required: true
        type: string
      runner_group:
        description: >
          Optional extra runner label for experiment-specific routing
          (same value as in ui-config.yaml).
          Leave blank to match any runner carrying runner_label.
        required: false
        type: string
      bits_version:
        description: >
          Specific bits version to install (e.g. 1.2.3).
          Leave blank to install the latest published release.
        required: false
        type: string
      bits_rc:
        description: >
          Base64-encoded bits-console.rc (generated by the console).
          Optional — only needed when the update step must read site-specific
          configuration (e.g. a private PyPI index set via BITS_PYPI_INDEX).
        required: false
        type: string

jobs:
  # ------------------------------------------------------------------
  update:
  # ------------------------------------------------------------------
    name: "Update bits on ${{ inputs.runner_label }}${{ inputs.runner_group && format(' [{0}]', inputs.runner_group) || '' }}"
    runs-on: >-
      ${{ fromJSON(
            inputs.runner_group != '' &&
            format('["self-hosted","{0}","{1}"]', inputs.runner_label, inputs.runner_group) ||
            format('["self-hosted","{0}"]', inputs.runner_label)
          ) }}

    steps:
      # ── Decode bits-console.rc (optional) ───────────────────────────────────
      - name: Decode bits-console.rc
        if: inputs.bits_rc != ''
        shell: bash
        run: |
          echo "${{ inputs.bits_rc }}" | base64 -d > ~/.bits-console.rc
          chmod 600 ~/.bits-console.rc
          echo "bits-console.rc written"

      # ── Record current version ───────────────────────────────────────────
      - name: Record current bits version
        id: before
        shell: bash
        run: |
          if command -v bits &>/dev/null; then
            VER=$(bits --version 2>/dev/null || echo "unknown")
          else
            VER="(not installed)"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "bits version before update: ${VER}"

      # ── Update bits ──────────────────────────────────────────────────────
      - name: Update bits
        shell: bash
        run: |
          [[ -f ~/.bits-console.rc ]] && set -a && source ~/.bits-console.rc && set +a

          # Determine the version spec (blank = latest).
          VERSION_SPEC="${{ inputs.bits_version }}"
          PKG="bits${VERSION_SPEC:+==${VERSION_SPEC}}"

          EXTRA_ARGS=""
          # Use a private index if configured via bits-console.rc.
          [[ -n "${BITS_PYPI_INDEX:-}" ]] && EXTRA_ARGS="--index-url ${BITS_PYPI_INDEX}"

          update_ok=0

          # Try pip / pip3 with --break-system-packages (needed on EL9 / Fedora).
          for PIP in pip pip3; do
            if command -v "$PIP" &>/dev/null; then
              echo "Trying: ${PIP} install --upgrade ${PKG}"
              if "$PIP" install --upgrade $EXTRA_ARGS "${PKG}" \
                   --break-system-packages 2>/dev/null \
                 || "$PIP" install --upgrade $EXTRA_ARGS "${PKG}" 2>/dev/null; then
                update_ok=1
                break
              fi
            fi
          done

          # Fall back to pipx.
          if [[ $update_ok -eq 0 ]] && command -v pipx &>/dev/null; then
            echo "Trying: pipx upgrade bits"
            pipx upgrade bits $EXTRA_ARGS && update_ok=1
          fi

          if [[ $update_ok -eq 0 ]]; then
            echo "::error::Could not update bits — no suitable package manager found."
            exit 1
          fi

      # ── Verify and report ────────────────────────────────────────────────
      - name: Report new bits version
        id: after
        shell: bash
        run: |
          VER=$(bits --version 2>/dev/null || echo "unknown")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "╔══════════════════════════════════╗"
          echo "  bits updated on ${{ inputs.runner_label }}"
          echo "  Before : ${{ steps.before.outputs.version }}"
          echo "  After  : ${VER}"
          echo "╚══════════════════════════════════╝"

      # ── Set bits executable permissions ─────────────────────────────────
      # Ensures the bits script is executable after a fresh pip install that
      # may have written a script without the executable bit on some systems.
      - name: Ensure bits is executable
        shell: bash
        run: |
          BITS_BIN=$(command -v bits 2>/dev/null || true)
          if [[ -n "${BITS_BIN}" ]]; then
            chmod +x "${BITS_BIN}" 2>/dev/null || true
            echo "bits executable: ${BITS_BIN}"
          fi
