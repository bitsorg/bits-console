# Scheduled build dispatcher for bits packages
#
# Reads every enabled JSON file under schedules/ and dispatches a
# cvmfs-publish.yml run for each enabled entry.
#
# Schedule files live at   schedules/*.json   in this repository.
# Each file has the shape:
#
#   {
#     "cron":        "0 2 * * *",          # informational only
#     "description": "Nightly LCG builds",
#     "enabled":     true,
#     "entries": [
#       {
#         "package":          "ROOT",
#         "version":          "",           # blank = latest
#         "platform":         "x86_64-el9",
#         "cvmfs_target":     "/cvmfs/sft.cern.ch/lcg/releases/ROOT//x86_64-el9",
#         "rebuild":          false,
#         "no_deps":          false,
#         "debug":            false,
#         "jobs":             "0",
#         "config_dir":       "",           # overrides config_repo from ui-config.yaml
#         "architecture":     "",
#         "extra_build_args": "",
#         "runner_group":     "",           # entry-level override; falls back to ui-config.yaml
#         "enabled":          true
#       }
#     ]
#   }
#
# bits.rc delivery
# ────────────────
# At startup this workflow reads ui-config.yaml, constructs a bits.rc file
# from the runner_config section, base64-encodes it, and forwards it to every
# cvmfs-publish.yml dispatch.  This makes downstream runners fully agnostic —
# they receive all experiment-specific configuration in the bits.rc payload
# rather than from pre-baked runner environment files.
#
# runner_group routing
# ────────────────────
# The runner_group value is taken from (highest priority first):
#   1. entry.runner_group     — per-build override in the schedule JSON
#   2. schedule.runner_group  — per-file override
#   3. ui-config.yaml         — global default for this console
#   4. empty string           — route to any available runner
#
# Required permissions:
#   GITHUB_TOKEN needs actions:write to dispatch cvmfs-publish.yml within
#   the same repository.  This is granted by the permissions block below.

name: Scheduled Builds

on:
  schedule:
    # Daily at 02:00 UTC.  Adjust here or add extra cron entries as needed.
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      schedule_file:
        description: >
          Specific schedule file to run (e.g. nightly.json).
          Leave blank to process all enabled files.
        required: false
        default: ''
        type: string
      dry_run:
        description: >
          Print the jobs that would be dispatched without actually triggering them.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions:  write   # required to dispatch cvmfs-publish.yml in the same repo

jobs:
  # ------------------------------------------------------------------
  dispatch:
  # ------------------------------------------------------------------
    name: Dispatch scheduled builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (to read schedule files and ui-config.yaml)
        uses: actions/checkout@v4

      - name: Build bits.rc from ui-config.yaml
        id: build-rc
        run: |
          python3 - <<'PYEOF'
          import base64, os, re, sys

          # Minimal key:value YAML parser (mirrors the SPA's parseSimpleYaml).
          def parse_yaml(text):
              result = {}
              for line in text.splitlines():
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  m = re.match(r'^(\w+)\s*:\s*(.*)$', line)
                  if m:
                      key, val = m.group(1), m.group(2).strip().strip('"\'')
                      result[key] = val
              return result

          try:
              with open('ui-config.yaml') as f:
                  cfg = parse_yaml(f.read())
          except FileNotFoundError:
              print("ui-config.yaml not found — using empty bits.rc")
              cfg = {}

          # Build bits.rc lines from the runner-configuration fields.
          lines = ["# bits.rc — generated by scheduled-build.yml from ui-config.yaml"]
          mappings = [
              ('cvmfs_repo',    'BITS_CVMFS_REPO'),
              ('cvmfs_prefix',  'BITS_CVMFS_PREFIX'),
              ('spool_host',    'BITS_SPOOL_HOST'),
              ('spool_user',    'BITS_SPOOL_USER'),
              ('spool_path',    'BITS_SPOOL_PATH'),
              ('ssh_key_file',  'BITS_SSH_KEY_FILE'),
              ('config_repo',   'BITS_CONFIG_REPO'),
          ]
          for yaml_key, env_key in mappings:
              val = cfg.get(yaml_key, '').strip()
              if val:
                  lines.append(f'{env_key}={val}')

          bits_rc_content = '\n'.join(lines) + '\n'
          bits_rc_b64     = base64.b64encode(bits_rc_content.encode()).decode()
          runner_group    = cfg.get('runner_group', '').strip()

          # Write to GITHUB_OUTPUT so the dispatch step can read them.
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'bits_rc={bits_rc_b64}\n')
              f.write(f'runner_group={runner_group}\n')

          print("bits.rc content:")
          print(bits_rc_content)
          print(f"runner_group: '{runner_group}'")
          PYEOF

      - name: Dispatch builds from schedule files
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          SCHEDULE_FILE: ${{ inputs.schedule_file }}
          DRY_RUN:       ${{ inputs.dry_run || 'false' }}
          REPO:          ${{ github.repository }}
          BITS_RC:       ${{ steps.build-rc.outputs.bits_rc }}
          RUNNER_GROUP:  ${{ steps.build-rc.outputs.runner_group }}
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, subprocess, sys

          repo         = os.environ["REPO"]
          dry_run      = os.environ.get("DRY_RUN", "").lower() in ("true", "1")
          only_file    = os.environ.get("SCHEDULE_FILE", "").strip()
          bits_rc      = os.environ.get("BITS_RC", "")
          default_group = os.environ.get("RUNNER_GROUP", "")

          # Collect schedule files
          if only_file:
              candidates = [f"schedules/{only_file}"]
              files = [f for f in candidates if os.path.isfile(f)]
              if not files:
                  print(f"Schedule file not found: {only_file}")
                  sys.exit(1)
          else:
              files = sorted(glob.glob("schedules/*.json"))

          if not files:
              print("No schedule files found in schedules/ — nothing to do.")
              sys.exit(0)

          print(f"Processing {len(files)} schedule file(s)  [dry_run={dry_run}]\n")
          total_dispatched = 0
          total_skipped    = 0

          for fpath in files:
              with open(fpath) as f:
                  try:
                      sched = json.load(f)
                  except json.JSONDecodeError as e:
                      print(f"[ERROR] {fpath}: invalid JSON — {e}")
                      continue

              if not sched.get("enabled", True):
                  print(f"[SKIP ] {fpath}: disabled at file level")
                  total_skipped += 1
                  continue

              desc         = sched.get("description", fpath)
              entries      = sched.get("entries", [])
              # Schedule-level runner_group overrides ui-config.yaml default.
              file_group   = sched.get("runner_group", default_group)
              print(f"── {fpath}: {desc}")
              print(f"   {len(entries)} entries, runner_group='{file_group or '(any)'}'")

              for entry in entries:
                  pkg    = entry.get("package",      "").strip()
                  ver    = entry.get("version",       "").strip()
                  plat   = entry.get("platform",      "x86_64-el9")
                  target = entry.get("cvmfs_target",  "").strip()
                  # Entry-level runner_group is the highest-priority override.
                  group  = entry.get("runner_group",  file_group)
                  label  = f"{pkg} {ver or '(latest)'} → {plat}"

                  if not entry.get("enabled", True):
                      print(f"   [SKIP ] {label}: entry disabled")
                      total_skipped += 1
                      continue
                  if not pkg:
                      print(f"   [SKIP ] entry has no package name")
                      total_skipped += 1
                      continue
                  if not target:
                      print(f"   [SKIP ] {label}: no cvmfs_target configured")
                      total_skipped += 1
                      continue

                  dispatch_body = json.dumps({
                      "ref": "main",
                      "inputs": {
                          "package":          pkg,
                          "version":          ver,
                          "platform":         plat,
                          "cvmfs_target":     target,
                          "bits_rc":          bits_rc,
                          "runner_group":     group,
                          "rebuild":          str(entry.get("rebuild",          False)).lower(),
                          "no_deps":          str(entry.get("no_deps",          False)).lower(),
                          "debug":            str(entry.get("debug",            False)).lower(),
                          "jobs":             str(entry.get("jobs",             "0")),
                          "config_dir":       entry.get("config_dir",           ""),
                          "architecture":     entry.get("architecture",         ""),
                          "extra_build_args": entry.get("extra_build_args",     ""),
                      }
                  })

                  tag = "[DRY  ]" if dry_run else "[DISPATCH]"
                  print(f"   {tag} {label}  group='{group or 'any'}'")

                  if not dry_run:
                      result = subprocess.run(
                          [
                              "gh", "api",
                              f"repos/{repo}/actions/workflows/cvmfs-publish.yml/dispatches",
                              "--method", "POST",
                              "--input",  "-",
                          ],
                          input=dispatch_body,
                          capture_output=True,
                          text=True,
                      )
                      if result.returncode != 0:
                          err = (result.stderr or result.stdout).strip()
                          print(f"            ✗ {err}")
                      else:
                          total_dispatched += 1
                          print(f"            ✓ dispatched")

              print()

          print(f"Summary: {total_dispatched} dispatched, {total_skipped} skipped.")
          PYEOF
